<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Axiom</title>
<meta name="description" content="Log in to Axiom, the AI studio with every model in one account.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grain"></div>
<div class="aurora">
  <span></span><span></span><span></span>
  <div class="particles" id="particles"></div>
</div>
<div class="cursor-glow"></div>

<a href="index.html" class="auth-back">
  <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back to Axiom
</a>

<main class="auth-page">
  <div class="auth-card">

    <div class="auth-head">
      <a href="index.html" class="auth-logo" aria-label="Axiom home">
        <svg viewBox="0 0 24 24" width="26" height="26"><path d="M12 2 L22 20 L2 20 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 9 L16.5 17 L7.5 17 Z" fill="currentColor"/></svg>
      </a>
      <p class="auth-eyebrow">Welcome back</p>
      <h1>Log in to Axiom</h1>
      <p>Pick up where you left off across Voice, Vision, Scribe, and the rest of the studio.</p>
    </div>

    <!-- Step 1: OAuth options -->
    <div class="oauth-group" id="oauthGroup">
      <button type="button" class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#EA4335" d="M9 3.6c1.32 0 2.5.45 3.44 1.34l2.58-2.58C13.46.87 11.4 0 9 0 5.48 0 2.44 2.02.96 4.96l3 2.33C4.68 5.1 6.66 3.6 9 3.6z"/><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.08-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#FBBC05" d="M3.96 10.71a5.4 5.4 0 0 1 0-3.42v-2.33H.96a9 9 0 0 0 0 8.08l3-2.33z"/><path fill="#34A853" d="M9 18c2.4 0 4.42-.79 5.9-2.15l-2.92-2.26c-.81.55-1.85.87-2.98.87-2.34 0-4.32-1.5-5.04-3.62l-3 2.33C2.44 15.98 5.48 18 9 18z"/></svg>
        Continue with Google
      </button>
      <button type="button" class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M9.03 0C4.06 0 .06 3.94.06 8.8c0 3.9 2.55 7.2 6.08 8.37.45.08.6-.19.6-.42v-1.63c-2.47.53-3-1.05-3-1.05-.4-1.02-.98-1.29-.98-1.29-.8-.55.06-.54.06-.54.89.06 1.35.9 1.35.9.79 1.34 2.06.95 2.56.73.08-.57.31-.95.56-1.17-1.97-.22-4.04-.98-4.04-4.34 0-.96.35-1.74.9-2.36-.09-.22-.39-1.12.09-2.34 0 0 .73-.23 2.4.9a8.4 8.4 0 0 1 4.37 0c1.67-1.13 2.4-.9 2.4-.9.48 1.22.18 2.12.09 2.34.56.62.9 1.4.9 2.36 0 3.37-2.08 4.11-4.06 4.33.32.28.6.83.6 1.67v2.48c0 .23.15.51.6.42C15.45 16 18 12.7 18 8.8 18 3.94 14 0 9.03 0Z"/></svg>
        Continue with Apple
      </button>
      <button type="button" class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" fill="#F25022"/><rect x="13" y="3" width="8" height="8" fill="#7FBA00"/><rect x="3" y="13" width="8" height="8" fill="#00A4EF"/><rect x="13" y="13" width="8" height="8" fill="#FFB900"/></svg>
        Single sign-on (SSO)
      </button>
    </div>

    <div class="divider" id="emailDivider">or</div>

    <button type="button" class="btn btn-outline btn-full email-cta" id="emailCta">Continue with email</button>

    <!-- Step 2: Email + password, hidden until "Continue with email" is clicked -->
    <form class="auth-form hidden" id="emailForm" onsubmit="return false;">
      <button type="button" class="back-to-options" id="backToOptions">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All options
      </button>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#">Forgot?</a>
        </div>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-solid btn-full">Log in</button>
    </form>

    <p class="auth-foot">New to Axiom? <a href="register.html">Create an account</a></p>

    <p class="auth-legal">
      By continuing you agree to Axiom's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
