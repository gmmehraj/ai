<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign in — Axiom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grain"></div>
<div class="aurora"><span></span><span></span><span></span><div class="particles" id="particles"></div></div>

<a href="index.html" class="auth-back">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back to Axiom
</a>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-head">
      <span class="auth-logo"><svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2 L22 20 L2 20 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 9 L16.5 17 L7.5 17 Z" fill="currentColor"/></svg></span>
      <p class="auth-eyebrow">Welcome back</p>
      <h1>Sign in to Axiom</h1>
      <p>Pick up right where you left off, across every model.</p>
    </div>

    <div id="authError" style="display:none; background:rgba(242,101,122,.1); border:1px solid rgba(242,101,122,.3); color:var(--a-coral); font-size:0.83rem; padding:0.7rem 0.9rem; border-radius:var(--radius-s); margin-bottom:1.2rem;"></div>

    <!--
      OAuth is wired up in auth.js (data-oauth="google"/"github") but disabled
      here until you enable those providers in Supabase → Authentication →
      Providers. To bring this back, delete the comment markers around this
      block and re-add class="hidden" + id="emailCta" button below.

    <div class="oauth-group" id="oauthGroup">
      <button class="btn-oauth" data-oauth="google" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.09A6.6 6.6 0 015.5 12c0-.73.12-1.43.34-2.09V7.07H2.18A11 11 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 00-9.82 6.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Continue with Google
      </button>
      <button class="btn-oauth" data-oauth="github" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55v-1.94c-3.2.7-3.87-1.54-3.87-1.54-.53-1.33-1.29-1.69-1.29-1.69-1.05-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.55-.29-5.23-1.28-5.23-5.68 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 015.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.41-2.69 5.39-5.25 5.67.42.36.78 1.08.78 2.17v3.22c0 .3.21.66.79.55C20.71 21.39 24 17.08 24 12 24 5.65 18.85.5 12 .5z"/></svg>
        Continue with GitHub
      </button>
    </div>

    <div class="divider" id="emailDivider">or</div>

    <button class="btn btn-outline btn-full email-cta" id="emailCta" type="button">Continue with email</button>
    -->

    <form class="auth-form" id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@company.com" required>
      </div>
      <div class="field">
        <div class="field-row">
          <label for="loginPassword">Password</label>
          <a href="#">Forgot password?</a>
        </div>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-solid btn-full">Sign in</button>
    </form>

    <p class="auth-foot">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
